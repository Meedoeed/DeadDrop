{{ define "content" }}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadDrop — ячейка создана</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particles-bg"></canvas>
    
    <main style="width: 100%; max-width: 600px; margin: 0 auto;">
        <h1>Ячейка успешно создана!</h1>
        
        <div class="result-card">
            <div class="form-group">
                <label>Ссылка для получателя</label>
                <div class="copy-field">
                    <code class="secret-link" id="secretLink">http://localhost:8080/secret/{{ .ID }}</code>
                    <button class="copy-btn" onclick="copyToClipboard('secretLink')" title="Копировать">📋</button>
                </div>
                <small>Отправьте эту ссылку получателю</small>
            </div>

            <div class="form-group">
                <label>Пароль доступа</label>
                <div class="copy-field">
                    <code class="secret-password" id="secretPassword">{{ .Password }}</code>
                    <button class="copy-btn" onclick="copyToClipboard('secretPassword')" title="Копировать">📋</button>
                </div>
                <small class="warning">Сохраните пароль! Он больше не покажется</small>
            </div>

            <div class="form-group">
                <label>Исчезнет</label>
                <div class="expiry-field">
                    <code>{{ .ExpiresAt }}</code>
                </div>
            </div>

            <div class="form-group" style="margin-top: 2.5rem;">
                <a href="/" class="button-link">
                    <button type="button">Создать ещё одну ячейку</button>
                </a>
            </div>
        </div>
    </main>

    <script>
    function copyToClipboard(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            // Временное визуальное подтверждение
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = '';
            btn.style.background = 'linear-gradient(45deg, #00ffaa, #00ffff)';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '';
            }, 1000);
        }).catch(err => {
            alert('Не удалось скопировать');
        });
    }

    const canvas = document.getElementById('particles-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const numParticles = 100;
    const colors = ['#00ffff', '#ff00ff', '#9400ff', '#00ffaa'];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.opacity = Math.random() * 0.5 + 0.3;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            const opacityHex = Math.floor(this.opacity * 255).toString(16).padStart(2, '0');
            ctx.fillStyle = this.color + opacityHex;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
        }
    }
    
    function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 120) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(148, 0, 255, ${0.3 * (1 - distance / 120)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
    }
    
    let mouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
    });
    
    function init() {
        particles = [];
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }
    }
    
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        connectParticles();
        particles.forEach(p => {
            if (mouse.x && mouse.y) {
                let dx = p.x - mouse.x;
                let dy = p.y - mouse.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = dx / distance || 0;
                    let directionY = dy / distance || 0;
                    p.speedX += directionX * force * 0.6;
                    p.speedY += directionY * force * 0.6;
                }
            }
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }
    
    init();
    animate();
    </script>
</body>
</html>
{{ end }}
